# 🔒 Local Ensure SHA-Pinned GitHub Actions
#
# Purpose:
#   Verifies that every GitHub Action referenced by this repository is pinned
#   to an immutable commit SHA rather than a mutable tag.
#
# Scope:
#   This is a local workflow for the workflows repository. It delegates the
#   validation to the reusable SHA-pinning workflow.
#
# Why:
#   Pinning actions to commit SHAs improves supply chain security by ensuring
#   workflow executions always use a known, immutable version of an action.
#
# Triggers:
#   - Pushes that modify workflow files.
#   - Pull requests that modify workflow files.
#   - Manual execution via workflow_dispatch.
#
# Notes:
#   - The workflow only runs when GitHub workflow definitions change,
#     avoiding unnecessary executions.
#   - pull-requests: write permission allows the reusable workflow to provide
#     feedback on pull requests when appropriate.
#   - The workflow summary and Slack notification always run, ensuring failures
#     are still reported even if validation fails.

name: 🔒 Local Ensure SHA-Pinned GitHub Actions

on:
  # Validate workflow changes submitted via pull requests.
  pull_request:
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

  # Validate workflow changes pushed directly to any branch.
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/*.yml"
      - ".github/workflows/*.yaml"

  # Allow maintainers to run validation manually.
  workflow_dispatch:

# Prevent overlapping runs for the same workflow/ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions required by the reusable workflow.
permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  # Verify all referenced GitHub Actions are SHA pinned.
  ensure-sha-pinned:
    name: 🔒 Validate SHA-Pinned GitHub Actions
    uses: ./.github/workflows/reusable-ensure-sha-pinned-actions.yml

  # Generate a Markdown workflow summary even if validation fails.
  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - ensure-sha-pinned
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  # Notify Slack only for failure/timed_out results.
  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
