# 👋 Reusable First-Time Contributor Greetings
#
# Purpose:
#   Welcomes first-time contributors by automatically posting a friendly
#   message on their first issue or pull request.
#
# Features:
#   - Greets users on their first issue.
#   - Greets users on their first pull request.
#   - Supports customised welcome messages.
#   - Uses GitHub's official First Interaction action.
#
# Intended Usage:
#
#   jobs:
#     first-time-contributor-greetings:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-greetings.yml@master
#       secrets:
#         repo-token: ${{ secrets.GITHUB_TOKEN }}

name: 👋 Reusable First-Time Contributor Greetings

on:
  workflow_call:
    inputs:
      issue-message:
        description: "Message posted on a user's first issue"
        required: false
        type: string
        default: "Thank you for raising your first issue - all contributions to this project are welcome!"

      pr-message:
        description: "Message posted on a user's first pull request"
        required: false
        type: string
        default: "Thank you for raising your first pull request - all contributions to this project are welcome!"

    secrets:
      repo-token:
        description: "Token with permission to comment on issues and pull requests"
        required: true

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows the action to read repository information.
#
# issues: write
#   Allows welcome comments to be posted on issues.
#
# pull-requests: write
#   Allows welcome comments to be posted on pull requests.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Welcome users making their first contribution.
  first-time-contributor-greetings:
    name: 👋 First-Time Contributor Greetings
    runs-on: ubuntu-latest

    steps:
      # Post a welcome message on a contributor's first issue or pull request.
      - name: 👋 Welcome First-Time Contributors
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d  # v3.1.0
        with:
          repo_token: ${{ secrets.repo-token }}
          issue_message: ${{ inputs.issue-message }}
          pr_message: ${{ inputs.pr-message }}
