name: Reusable Secrets Scanner

on:
  workflow_call:
    inputs:
      path:
        description: "Repository path to scan (relative to the workspace)"
        required: false
        default: "."
        type: string

      base:
        description: "Base ref (maps to --since-commit); leave empty for the default PR/push behaviour"
        required: false
        default: ""
        type: string

      head:
        description: "Head ref (maps to --branch); leave empty for the default PR/push behaviour"
        required: false
        default: ""
        type: string

      extra_args:
        description: "Extra arguments passed to the TruffleHog CLI"
        required: false
        default: "--results=verified,unknown"
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scanner:
    name: Secrets Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f  # v3.95.8
        with:
          path: ${{ inputs.path }}
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}
          extra_args: ${{ inputs.extra_args }}
