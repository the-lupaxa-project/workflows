# 🐘 Reusable PHP Lint
#
# Purpose:
#   Validates PHP source files using the shared PHP linting pipeline.
#
# Features:
#   - Detects PHP syntax errors.
#   - Supports include and exclude filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#   - Uses the shared CICDToolbox PHP lint pipeline.
#
# Intended Usage:
#
#   jobs:
#     php-lint:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-php-lint.yml@master

name: 🐘 Reusable PHP Lint

on:
  workflow_call:
    inputs:
      include_files:
        description: "Comma-separated list of PHP files, globs, or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of PHP files, globs, or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Generate a report but do not fail the build"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show individual errors instead of only a per-file summary"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped files"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable coloured output"
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Runs PHP syntax validation.
  php-lint:
    name: 🐘 PHP Lint
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents that will be scanned.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Run the shared PHP lint pipeline.
      - name: 🐘 Run PHP Lint
        env:
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: |
          bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/php-lint/master/pipeline.sh)
