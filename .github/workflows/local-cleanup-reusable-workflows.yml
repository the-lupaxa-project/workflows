name: Local Cleanup Workflow Runs

on:
  schedule:
    - cron: "17 4 * * 0"

  workflow_dispatch:
    inputs:
      retention_days:
        type: string
        default: "90"

      artifact_retention_days:
        type: string
        default: "90"

      dry_run:
        type: choice
        options: ["true", "false"]
        default: "true"

      cleanup_artifacts:
        type: choice
        options: ["true", "false"]
        default: "false"

      preserve_branch:
        type: string
        default: "master"

      force_delete_non_default_branch:
        type: choice
        options: ["true", "false"]
        default: "false"

      keep_latest_successful:
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_failed:
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_cancelled:
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_timed_out:
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_last_n_successful:
        type: string
        default: "3"

      delete_skipped:
        type: choice
        options: ["true", "false"]
        default: "true"

      delete_neutral:
        type: choice
        options: ["true", "false"]
        default: "true"

      max_deletes_per_run:
        type: string
        default: "250"

      max_artifact_deletes_per_run:
        type: string
        default: "250"

      delete_sleep_seconds:
        type: string
        default: "1.0"

      progress_every:
        type: string
        default: "50"

      verbosity:
        type: choice
        options: ["quiet", "normal", "verbose"]
        default: "normal"

      upload_report_artifact:
        type: choice
        options: ["true", "false"]
        default: "true"

      report_artifact_retention_days:
        type: string
        default: "90"

permissions:
  actions: write
  contents: read

jobs:
  cleanup-workflow-runs:
    name: Cleanup Workflow Runs
    uses: ./.github/workflows/reusable-cleanup-workflow-runs.yml
    with:
      retention_days: ${{ inputs.retention_days || '90' }}
      artifact_retention_days: ${{ inputs.artifact_retention_days || '90' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      cleanup_artifacts: ${{ inputs.cleanup_artifacts || 'false' }}
      preserve_branch: ${{ inputs.preserve_branch || 'master' }}
      force_delete_non_default_branch: ${{ inputs.force_delete_non_default_branch || 'false' }}
      keep_latest_successful: ${{ inputs.keep_latest_successful || 'true' }}
      keep_latest_failed: ${{ inputs.keep_latest_failed || 'true' }}
      keep_latest_cancelled: ${{ inputs.keep_latest_cancelled || 'true' }}
      keep_latest_timed_out: ${{ inputs.keep_latest_timed_out || 'true' }}
      keep_last_n_successful: ${{ inputs.keep_last_n_successful || '3' }}
      delete_skipped: ${{ inputs.delete_skipped || 'true' }}
      delete_neutral: ${{ inputs.delete_neutral || 'true' }}
      max_deletes_per_run: ${{ inputs.max_deletes_per_run || '250' }}
      max_artifact_deletes_per_run: ${{ inputs.max_artifact_deletes_per_run || '250' }}
      delete_sleep_seconds: ${{ inputs.delete_sleep_seconds || '1.0' }}
      progress_every: ${{ inputs.progress_every || '50' }}
      verbosity: ${{ inputs.verbosity || 'normal' }}
      upload_report_artifact: ${{ inputs.upload_report_artifact || 'true' }}
      report_artifact_retention_days: ${{ inputs.report_artifact_retention_days || '90' }}

  status-check:
    name: Check Jobs Status
    needs:
      - cleanup-workflow-runs
    if: always()
    uses: ./.github/workflows/reusable-check-jobs-status.yml
    with:
      ignore_jobs: "Slack Workflow Status"

  slack-workflow-status:
    name: Slack Workflow Status
    needs:
      - status-check
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
      ignore_jobs: "Check Jobs Status,Slack Workflow Status"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
