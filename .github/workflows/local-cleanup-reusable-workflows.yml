name: Local Cleanup Workflow Runs

on:
  schedule:
    - cron: "17 4 * * 0"

  workflow_dispatch:
    inputs:
      retention_days:
        description: Delete completed workflow runs older than this many days.
        required: false
        type: number
        default: 90
      dry_run:
        description: Report what would be deleted without deleting anything.
        required: false
        type: boolean
        default: true
      keep_latest_successful:
        description: Keep the latest successful completed run for each workflow.
        required: false
        type: boolean
        default: true
      keep_latest_failed:
        description: Keep the latest failed completed run for each workflow.
        required: false
        type: boolean
        default: true
      keep_latest_cancelled:
        description: Keep the latest cancelled completed run for each workflow.
        required: false
        type: boolean
        default: true
      keep_latest_timed_out:
        description: Keep the latest timed-out completed run for each workflow.
        required: false
        type: boolean
        default: true
      keep_last_n_successful:
        description: Keep this many recent successful completed runs per workflow.
        required: false
        type: number
        default: 3
      delete_skipped:
        description: Delete skipped runs when older than retention period.
        required: false
        type: boolean
        default: true
      delete_neutral:
        description: Delete neutral runs when older than retention period.
        required: false
        type: boolean
        default: true

permissions:
  actions: write
  contents: read

jobs:
  cleanup-scheduled:
    name: Cleanup Workflow Runs
    if: github.event_name == 'schedule'
    uses: the-lupaxa-project/workflows/.github/workflows/reusable-cleanup-workflow-runs.yml@master
    with:
      dry_run: false

  cleanup-manual:
    name: Cleanup Workflow Runs
    if: github.event_name == 'workflow_dispatch'
    uses: the-lupaxa-project/workflows/.github/workflows/reusable-cleanup-workflow-runs.yml@master
    with:
      retention_days: ${{ inputs.retention_days }}
      dry_run: ${{ inputs.dry_run }}
      keep_latest_successful: ${{ inputs.keep_latest_successful }}
      keep_latest_failed: ${{ inputs.keep_latest_failed }}
      keep_latest_cancelled: ${{ inputs.keep_latest_cancelled }}
      keep_latest_timed_out: ${{ inputs.keep_latest_timed_out }}
      keep_last_n_successful: ${{ inputs.keep_last_n_successful }}
      delete_skipped: ${{ inputs.delete_skipped }}
      delete_neutral: ${{ inputs.delete_neutral }}
