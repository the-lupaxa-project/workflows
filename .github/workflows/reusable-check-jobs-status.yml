name: Check Jobs Status Summary

on:
  workflow_call:
    inputs:
      ignore_jobs:
        description: >
          Comma-separated list of job names to exclude from the summary.
          Names are normalised (segment after the last "/") and matched
          case-insensitively.
        required: false
        type: string
        default: ""
      upload_artifact:
        description: Upload the generated Markdown summary as a workflow artifact.
        required: false
        type: boolean
        default: true
      artifact_retention_days:
        description: >
          Number of days to retain the uploaded Markdown summary artifact.
          Must not exceed the repository, organisation, or enterprise limit.
        required: false
        type: number
        default: 90

permissions:
  actions: read
  contents: read

jobs:
  check-jobs-status:
    name: Check Jobs Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflows repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: the-lupaxa-project/workflows
          path: lupaxa-dotgithub

      - name: Run Check Jobs Python summary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CHECK_JOBS_IGNORE_JOBS: ${{ inputs.ignore_jobs }}
          CHECK_JOBS_SUMMARY_FILE: check-jobs-summary.md
        run: python lupaxa-dotgithub/.github/scripts/check-jobs.py

      - name: Upload Check Jobs summary artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: check-jobs-summary-${{ github.job }}-${{ github.run_attempt }}
          path: check-jobs-summary.md
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
