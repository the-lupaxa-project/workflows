name: Reusable Cleanup Workflow Runs

on:
  workflow_call:
    inputs:
      retention_days:
        description: Delete completed workflow runs older than this many days.
        required: false
        type: string
        default: "90"

      dry_run:
        description: Report what would be deleted without deleting anything.
        required: false
        type: string
        default: "true"

      keep_latest_successful:
        description: Keep the latest successful completed run for each workflow.
        required: false
        type: string
        default: "true"

      keep_latest_failed:
        description: Keep the latest failed completed run for each workflow.
        required: false
        type: string
        default: "true"

      keep_latest_cancelled:
        description: Keep the latest cancelled completed run for each workflow.
        required: false
        type: string
        default: "true"

      keep_latest_timed_out:
        description: Keep the latest timed-out completed run for each workflow.
        required: false
        type: string
        default: "true"

      keep_last_n_successful:
        description: Keep this many recent successful completed runs per workflow.
        required: false
        type: string
        default: "3"

      keep_representatives_default_branch_only:
        description: Only preserve representative runs from the repository default branch.
        required: false
        type: string
        default: "true"

      delete_skipped:
        description: Delete skipped runs when they are older than the retention period.
        required: false
        type: string
        default: "true"

      delete_neutral:
        description: Delete neutral runs when they are older than the retention period.
        required: false
        type: string
        default: "true"

      max_deletes_per_run:
        description: Maximum workflow runs to delete in one cleanup execution. Use 0 for unlimited.
        required: false
        type: string
        default: "250"

      delete_sleep_seconds:
        description: Seconds to sleep between delete calls to reduce API throttling risk.
        required: false
        type: string
        default: "1.0"

      progress_every:
        description: Print progress after this many inspected workflow runs. Use 0 to disable.
        required: false
        type: string
        default: "50"

permissions:
  actions: write
  contents: read

jobs:
  cleanup-workflow-runs:
    name: Cleanup Workflow Runs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflows repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: the-lupaxa-project/workflows
          path: lupaxa-dotgithub

      - name: Cleanup old workflow runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CLEANUP_WORKFLOW_RUNS_RETENTION_DAYS: ${{ inputs.retention_days }}
          CLEANUP_WORKFLOW_RUNS_DRY_RUN: ${{ inputs.dry_run }}
          CLEANUP_WORKFLOW_RUNS_KEEP_LATEST_SUCCESSFUL: ${{ inputs.keep_latest_successful }}
          CLEANUP_WORKFLOW_RUNS_KEEP_LATEST_FAILED: ${{ inputs.keep_latest_failed }}
          CLEANUP_WORKFLOW_RUNS_KEEP_LATEST_CANCELLED: ${{ inputs.keep_latest_cancelled }}
          CLEANUP_WORKFLOW_RUNS_KEEP_LATEST_TIMED_OUT: ${{ inputs.keep_latest_timed_out }}
          CLEANUP_WORKFLOW_RUNS_KEEP_LAST_N_SUCCESSFUL: ${{ inputs.keep_last_n_successful }}
          CLEANUP_WORKFLOW_RUNS_KEEP_REPRESENTATIVES_DEFAULT_BRANCH_ONLY: ${{ inputs.keep_representatives_default_branch_only }}
          CLEANUP_WORKFLOW_RUNS_DELETE_SKIPPED: ${{ inputs.delete_skipped }}
          CLEANUP_WORKFLOW_RUNS_DELETE_NEUTRAL: ${{ inputs.delete_neutral }}
          CLEANUP_WORKFLOW_RUNS_MAX_DELETES: ${{ inputs.max_deletes_per_run }}
          CLEANUP_WORKFLOW_RUNS_DELETE_SLEEP_SECONDS: ${{ inputs.delete_sleep_seconds }}
          CLEANUP_WORKFLOW_RUNS_PROGRESS_EVERY: ${{ inputs.progress_every }}
        run: python lupaxa-dotgithub/.github/scripts/cleanup-workflow-runs.py
