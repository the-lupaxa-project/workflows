# 📝 Reusable Markdown Lint
#
# Purpose:
#   Validates Markdown files using the shared Markdown linting pipeline.
#
# Features:
#   - Detects Markdown formatting and style issues.
#   - Supports include and exclude filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#   - Uses the shared CICDToolbox Markdown lint pipeline.
#
# Intended Usage:
#
#   jobs:
#     markdown-lint:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-markdown-lint.yml@master

name: 📝 Reusable Markdown Lint

on:
  workflow_call:
    inputs:
      include_files:
        description: "Comma-separated list or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Do not fail the build even if errors occur"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed error output"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped or ignored files in the output"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable ANSI colours."
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Runs Markdown linting.
  markdown-lint:
    name: 📝 Markdown Lint
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents that will be scanned.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Install Node.js required by the Markdown linting toolchain.
      - name: 🟢 Set Up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"

      # Run the shared Markdown lint pipeline.
      - name: 📝 Run Markdown Lint
        env:
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: |
          bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/markdown-lint/master/pipeline.sh)
