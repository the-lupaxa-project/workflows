name: Reusable Code Analysis

on:
  workflow_call:
    inputs:
      languages:
        description: >
          Comma-separated list of languages to analyze
          (e.g. "python" or "javascript,python,go").
        required: true
        type: string

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  code-analysis:
    name: Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@17783bfb99b07f70fae080b654aed0c514057477  # v2.23.3
        with:
          languages: ${{ inputs.languages }}
          queries: +security-and-quality

      - name: Autobuild Project
        uses: github/codeql-action/autobuild@17783bfb99b07f70fae080b654aed0c514057477  # v2.23.3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@17783bfb99b07f70fae080b654aed0c514057477  # v2.23.3
