# 📊 Reusable Workflow Summary
#
# Purpose:
#   Generates a Markdown summary of the current workflow execution, including
#   job results and workflow metadata.
#
# Features:
#   - Summarises all workflow jobs by result.
#   - Groups jobs by outcome.
#   - Includes workflow metadata and execution details.
#   - Allows selected jobs to be excluded from the summary.
#   - Automatically excludes the workflow summary and Slack notification jobs.
#   - Optionally uploads the generated summary as a workflow artifact.
#
# Intended Usage:
#
#   jobs:
#     workflow-summary:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-workflow-summary.yml@master

name: 📊 Reusable Workflow Summary

on:
  workflow_call:
    inputs:
      ignore_jobs:
        description: >
          Comma-separated list of job names to exclude from the summary.
          Names are normalised and matched case-insensitively.
        required: false
        type: string
        default: ""

      upload_artifact:
        description: "Upload the generated Markdown summary as a workflow artifact."
        required: false
        type: boolean
        default: true

      artifact_retention_days:
        description: >
          Number of days to retain the uploaded Markdown summary artifact.
          Must not exceed the repository, organisation, or enterprise limit.
        required: false
        type: number
        default: 90

# Permissions required by this reusable workflow.
#
# actions: read
#   Allows workflow and job information to be read from the GitHub Actions API.
#
# contents: read
#   Allows checkout of the shared workflows repository.
permissions:
  actions: read
  contents: read

jobs:
  # Generates a workflow execution summary.
  workflow-summary:
    name: 📊 Workflow Summary
    runs-on: ubuntu-latest

    steps:
      # Checkout the shared workflows repository containing the summary script.
      - name: 📥 Checkout Workflows Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: the-lupaxa-project/workflows
          path: lupaxa-dotgithub

      # Generate the Markdown workflow summary.
      - name: 📊 Generate Workflow Summary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_IGNORE_JOBS: "📊 Workflow Summary,💬 Slack Notification,${{ inputs.ignore_jobs }}"
        run: |
          python lupaxa-dotgithub/.github/scripts/workflow-summary.py

      # Upload the generated summary as a workflow artifact.
      - name: 📦 Upload Workflow Summary Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: workflow-summary
          path: workflow-summary-*.md
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
