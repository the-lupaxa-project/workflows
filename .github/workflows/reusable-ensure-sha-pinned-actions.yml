# 🔒 Reusable SHA-Pinned Actions Validation
#
# Purpose:
#   Verifies that all GitHub Actions referenced by workflow files are pinned
#   to immutable commit SHAs rather than mutable tags.
#
# Features:
#   - Detects actions that are not pinned to commit SHAs.
#   - Supports an allow list for trusted repositories.
#   - Optional dry-run mode for reporting without failing.
#   - Always permits reusable workflows from the-lupaxa-project/workflows.
#
# Intended Usage:
#
#   jobs:
#     sha-pinned-actions-validation:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-ensure-sha-pinned-actions.yml@master

name: 🔒 Reusable SHA-Pinned Actions Validation

on:
  workflow_call:
    inputs:
      allow_list:
        description: >
          Optional newline-separated list of owner[/repo] patterns that are
          allowed to use non-SHA refs (e.g. "the-lupaxa-project/.github").
          Each line should be either "owner/" or "owner/repo".
        required: false
        type: string

      dry_run:
        description: >
          If true, only report unpinned actions but do not fail the job.
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows workflow files to be checked out and inspected.
#
# pull-requests: write
#   Allows annotations and pull request feedback where supported by the action.
permissions:
  contents: read
  pull-requests: write

jobs:
  # Validates that all GitHub Actions are pinned to immutable commit SHAs.
  sha-pinned-actions-validation:
    name: 🔒 SHA-Pinned Actions Validation
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository containing the workflow files.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Verify that workflow actions are pinned to commit SHAs.
      - name: 🔒 Verify SHA-Pinned GitHub Actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9  # v5.0.5
        with:
          allowlist: |
            the-lupaxa-project/workflows
            ${{ inputs.allow_list }}
          dry_run: ${{ inputs.dry_run }}
