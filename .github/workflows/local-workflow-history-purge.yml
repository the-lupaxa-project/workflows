name: Local Workflow History Purge

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report what would be deleted without deleting workflow runs."
        required: false
        type: boolean
        default: true

      limit:
        description: "Maximum number of completed workflow runs to delete (0 = unlimited)."
        required: false
        type: string
        default: "0"

      delay_seconds:
        description: "Delay in seconds between delete requests."
        required: false
        type: string
        default: "0.25"

      verbosity:
        description: "Output verbosity (0=summary, 1=progress, 2=detailed)."
        required: false
        type: choice
        default: "1"
        options:
          - "0"
          - "1"
          - "2"

      retries:
        description: "Number of retries for transient GitHub API failures."
        required: false
        type: string
        default: "3"

      yes:
        description: "I understand this will permanently delete GitHub Actions workflow history."
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

jobs:
  workflow-history-purge:
    name: ⚠️ Workflow History Purge
    uses: ./.github/workflows/reusable-workflow-history-purge.yml
    with:
      dry_run: ${{ inputs.dry_run }}
      limit: ${{ inputs.limit }}
      delay_seconds: ${{ inputs.delay_seconds }}
      verbosity: ${{ inputs.verbosity }}
      retries: ${{ inputs.retries }}
      yes: ${{ inputs.yes }}
