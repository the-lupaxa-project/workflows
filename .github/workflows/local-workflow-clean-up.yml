name: Local Workflow Clean Up

on:
  schedule:
    - cron: "17 4 * * 0"

  workflow_dispatch:
    inputs:
      retention_days:
        description: Delete completed workflow runs older than this many days.
        required: false
        type: string
        default: "90"

      artifact_retention_days:
        description: Delete artifacts older than this many days when artifact cleanup is enabled.
        required: false
        type: string
        default: "90"

      dry_run:
        description: Report what would be deleted without deleting anything.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      cleanup_artifacts:
        description: Also delete old repository workflow artifacts.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      remove_obsolete:
        description: Remove completed workflow runs whose workflow file no longer exists.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      preserve_branch:
        description: Branch to preserve representative successful workflow runs for.
        required: false
        type: string
        default: "master"

      keep_last_n_successful:
        description: Keep this many recent successful completed runs per workflow on preserve_branch.
        required: false
        type: string
        default: "3"

      max_deletes_per_run:
        description: Maximum workflow runs to delete in one cleanup execution. Use 0 for unlimited.
        required: false
        type: string
        default: "250"

      max_artifact_deletes_per_run:
        description: Maximum artifacts to delete in one cleanup execution. Use 0 for unlimited.
        required: false
        type: string
        default: "250"

      verbosity:
        description: Log verbosity. Use quiet, normal, or verbose.
        required: false
        type: choice
        options: ["quiet", "normal", "verbose"]
        default: "normal"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  workflow-clean-up:
    name: Workflow Clean Up
    uses: ./.github/workflows/reusable-workflow-clean-up.yml
    with:
      retention_days: ${{ inputs.retention_days || '90' }}
      artifact_retention_days: ${{ inputs.artifact_retention_days || '90' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      cleanup_artifacts: ${{ inputs.cleanup_artifacts || 'true' }}
      remove_obsolete: ${{ inputs.remove_obsolete || 'true' }}
      preserve_branch: ${{ inputs.preserve_branch || 'master' }}
      keep_last_n_successful: ${{ inputs.keep_last_n_successful || '3' }}
      delete_skipped: "true"
      delete_neutral: "true"
      max_deletes_per_run: ${{ inputs.max_deletes_per_run || '250' }}
      max_artifact_deletes_per_run: ${{ inputs.max_artifact_deletes_per_run || '250' }}
      delete_sleep_seconds: "1.0"
      progress_every: "50"
      verbosity: ${{ inputs.verbosity || 'normal' }}
      api_retries: "3"
      upload_report_artifact: "true"
      report_artifact_retention_days: "90"

  generate-workflow-summary:
    name: Generate Workflow Summary
    needs:
      - workflow-clean-up
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  generate-workflow-notifications:
    name: Generate Workflow Notifications
    needs:
      - generate-workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-workflow-notifier.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
