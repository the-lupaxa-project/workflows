name: Local Workflow Clean Up

on:
  schedule:
    - cron: "17 4 * * 0"

  workflow_dispatch:
    inputs:
      retention_days:
        description: Delete completed workflow runs older than this many days.
        required: false
        type: string
        default: "90"

      artifact_retention_days:
        description: Delete artifacts older than this many days when artifact cleanup is enabled.
        required: false
        type: string
        default: "90"

      dry_run:
        description: Report what would be deleted without deleting anything.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      cleanup_artifacts:
        description: Also delete old repository workflow artifacts.
        required: false
        type: choice
        options: ["true", "false"]
        default: "false"

      preserve_branch:
        description: Branch to preserve representative workflow runs for.
        required: false
        type: string
        default: "master"

      force_delete_non_default_branch:
        description: Force-delete completed runs not on preserve_branch, ignoring retention and representative keeps.
        required: false
        type: choice
        options: ["true", "false"]
        default: "false"

      keep_latest_successful:
        description: Keep the latest successful completed run for each workflow on preserve_branch.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_failed:
        description: Keep the latest failed completed run for each workflow on preserve_branch.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_cancelled:
        description: Keep the latest cancelled completed run for each workflow on preserve_branch.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_latest_timed_out:
        description: Keep the latest timed-out completed run for each workflow on preserve_branch.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      keep_last_n_successful:
        description: Keep this many recent successful completed runs per workflow on preserve_branch.
        required: false
        type: string
        default: "3"

      delete_skipped:
        description: Delete skipped runs when they are older than the retention period.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      delete_neutral:
        description: Delete neutral runs when they are older than the retention period.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      max_deletes_per_run:
        description: Maximum workflow runs to delete in one cleanup execution. Use 0 for unlimited.
        required: false
        type: string
        default: "250"

      max_artifact_deletes_per_run:
        description: Maximum artifacts to delete in one cleanup execution. Use 0 for unlimited.
        required: false
        type: string
        default: "250"

      delete_sleep_seconds:
        description: Seconds to sleep between delete calls to reduce API throttling risk.
        required: false
        type: string
        default: "1.0"

      progress_every:
        description: Print progress after this many inspected workflow runs. Use 0 to disable.
        required: false
        type: string
        default: "50"

      verbosity:
        description: Log verbosity. Use quiet, normal, or verbose.
        required: false
        type: choice
        options: ["quiet", "normal", "verbose"]
        default: "normal"

      upload_report_artifact:
        description: Upload the generated Markdown cleanup report as a workflow artifact.
        required: false
        type: choice
        options: ["true", "false"]
        default: "true"

      report_artifact_retention_days:
        description: Number of days to retain the uploaded cleanup report artifact.
        required: false
        type: string
        default: "90"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  workflow-clean-up:
    name: Cleanup Workflow Runs
    uses: ./.github/workflows/reusable-workflow-clean-up.yml
    with:
      retention_days: ${{ inputs.retention_days || '90' }}
      artifact_retention_days: ${{ inputs.artifact_retention_days || '90' }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      cleanup_artifacts: ${{ inputs.cleanup_artifacts || 'false' }}
      preserve_branch: ${{ inputs.preserve_branch || 'master' }}
      force_delete_non_default_branch: ${{ inputs.force_delete_non_default_branch || 'false' }}
      keep_latest_successful: ${{ inputs.keep_latest_successful || 'true' }}
      keep_latest_failed: ${{ inputs.keep_latest_failed || 'true' }}
      keep_latest_cancelled: ${{ inputs.keep_latest_cancelled || 'true' }}
      keep_latest_timed_out: ${{ inputs.keep_latest_timed_out || 'true' }}
      keep_last_n_successful: ${{ inputs.keep_last_n_successful || '3' }}
      delete_skipped: ${{ inputs.delete_skipped || 'true' }}
      delete_neutral: ${{ inputs.delete_neutral || 'true' }}
      max_deletes_per_run: ${{ inputs.max_deletes_per_run || '250' }}
      max_artifact_deletes_per_run: ${{ inputs.max_artifact_deletes_per_run || '250' }}
      delete_sleep_seconds: ${{ inputs.delete_sleep_seconds || '1.0' }}
      progress_every: ${{ inputs.progress_every || '50' }}
      verbosity: ${{ inputs.verbosity || 'normal' }}
      upload_report_artifact: ${{ inputs.upload_report_artifact || 'true' }}
      report_artifact_retention_days: ${{ inputs.report_artifact_retention_days || '90' }}

  generate-workflow-summary:
    name: Generate Workflow Summary
    needs:
      - workflow-clean-up
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  generate-workflow-notifications:
    name: Generate Workflow Notifications
    needs:
      - generate-workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-workflow-notifier.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
