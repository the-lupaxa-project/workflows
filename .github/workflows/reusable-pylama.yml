# 🦙 Reusable Pylama
#
# Purpose:
#   Runs multiple Python code quality checks using the shared Pylama pipeline.
#
# Features:
#   - Aggregates multiple Python linters into a single validation pass.
#   - Supports include and exclude filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#   - Uses the shared CICDToolbox Pylama pipeline.
#
# Intended Usage:
#
#   jobs:
#     pylama:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-pylama.yml@master

name: 🦙 Reusable Pylama

on:
  workflow_call:
    inputs:
      include_files:
        description: "Comma-separated list of files or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of files or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Generate a report but do not fail the build"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed errors"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped files"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable coloured output"
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Runs the Pylama validation pipeline.
  pylama:
    name: 🦙 Pylama
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents that will be scanned.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Run the shared Pylama pipeline.
      - name: 🦙 Run Pylama
        env:
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/pylama/master/pipeline.sh)
