name: 🐍 Reusable Python CI via Make

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions"
        required: false
        type: string
        default: '["3.10","3.11","3.12","3.13","3.14"]'

      install-target:
        description: "Make target for installing development dependencies"
        required: false
        type: string
        default: "install-dev"

      ci-target:
        description: "Make target that runs lint, type checks, and tests"
        required: false
        type: string
        default: "check"

permissions:
  contents: read

jobs:
  python-ci:
    name: 🐍 Python CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: 🐍 Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: ℹ️ Show Python Version
        run: |
          python --version
          which python

      - name: 📦 Install Development Dependencies
        run: |
          make PYTHON=python ${{ inputs.install-target }}

      - name: 🧪 Run CI Checks
        run: |
          make PYTHON=python ${{ inputs.ci-target }}
