name: Reusable Secrets scan (TruffleHog)

on:
  workflow_call:
    inputs:
      path:
        description: "Repository path to scan (relative to workspace)"
        required: false
        default: "."
        type: string
      base:
        description: "Base ref (maps to --since-commit); leave empty for default PR/push behaviour"
        required: false
        default: ""
        type: string
      head:
        description: "Head ref (maps to --branch); leave empty for default PR/push behaviour"
        required: false
        default: ""
        type: string
      extra_args:
        description: "Extra arguments passed to TruffleHog CLI"
        required: false
        default: "--results=verified,unknown"
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Run secrets scan
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51  # v3.95.5
        with:
          path: ${{ inputs.path }}
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}
          extra_args: ${{ inputs.extra_args }}
