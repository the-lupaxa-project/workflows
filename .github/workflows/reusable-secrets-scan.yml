name: Reusable Secrets scan (TruffleHog)

on:
  workflow_call:
    inputs:
      path:
        description: "Repository path to scan (relative to workspace)"
        required: false
        default: "."
        type: string
      base:
        description: "Base ref (maps to --since-commit); leave empty for default PR/push behaviour"
        required: false
        default: ""
        type: string
      head:
        description: "Head ref (maps to --branch); leave empty for default PR/push behaviour"
        required: false
        default: ""
        type: string
      extra_args:
        description: "Extra arguments passed to TruffleHog CLI"
        required: false
        default: "--results=verified,unknown"
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Run secrets scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab  # v3.95.3
        with:
          path: ${{ inputs.path }}
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}
          extra_args: ${{ inputs.extra_args }}
