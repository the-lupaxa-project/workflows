# 🔐 Reusable Secrets Scan
#
# Purpose:
#   Scans a repository for exposed secrets using TruffleHog.
#
# Features:
#   - Scans the entire repository or a specified path.
#   - Supports pull request and branch comparisons.
#   - Accepts additional TruffleHog command-line arguments.
#   - Uses the official TruffleHog GitHub Action.
#
# Intended Usage:
#
#   jobs:
#     secrets-scan:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-secrets-scan.yml@master

name: 🔐 Reusable Secrets Scan

on:
  workflow_call:
    inputs:
      path:
        description: "Repository path to scan (relative to the workspace)"
        required: false
        default: "."
        type: string

      base:
        description: "Base ref (maps to --since-commit); leave empty for the default PR/push behaviour"
        required: false
        default: ""
        type: string

      head:
        description: "Head ref (maps to --branch); leave empty for the default PR/push behaviour"
        required: false
        default: ""
        type: string

      extra_args:
        description: "Extra arguments passed to the TruffleHog CLI"
        required: false
        default: "--results=verified,unknown"
        type: string

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository contents.
#
# pull-requests: read
#   Allows pull request metadata to be read when scanning PRs.
permissions:
  contents: read
  pull-requests: read

jobs:
  # Runs the TruffleHog secret scanning action.
  secrets-scan:
    name: 🔐 Secrets Scan
    runs-on: ubuntu-latest

    steps:
      # Checkout the complete repository history so TruffleHog can compare commits.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # Run the TruffleHog secrets scan.
      - name: 🔐 Run TruffleHog
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334  # v3.95.7
        with:
          path: ${{ inputs.path }}
          base: ${{ inputs.base }}
          head: ${{ inputs.head }}
          extra_args: ${{ inputs.extra_args }}
