# 🧪 Local Workflow Summary CI - workflow-summary.py
#
# Purpose:
#   Validates the workflow-summary.py helper script using the reusable Python CI
#   workflow whenever the script or its corresponding reusable/local workflow
#   definitions change.
#
# Scope:
#   This is a local workflow for the workflows repository. It delegates all
#   Python validation (syntax checking, linting, type checking and tests where
#   applicable) to the reusable Python CI workflow.
#
# Triggers:
#   - Pushes affecting workflow-summary.py or related workflow files.
#   - Pull requests affecting workflow-summary.py or related workflow files.
#   - Manual execution via workflow_dispatch.
#
# Notes:
#   - Restricting the trigger paths keeps CI fast by only running when the
#     monitored script or its workflow definitions change.
#   - The reusable Python CI workflow performs the actual validation.
#   - The workflow summary and Slack notification always run, ensuring failures
#     are still reported even if the Python CI job fails.

name: 🧪 Local Workflow Summary CI - workflow-summary.py

on:
  # Validate the script whenever it or related workflows change.
  push:
    paths:
      - ".github/scripts/workflow-summary.py"
      - ".github/workflows/local-workflow-summary-ci.yml"
      - ".github/workflows/reusable-workflow-summary.yml"

  # Validate pull requests that modify the script or related workflows.
  pull_request:
    paths:
      - ".github/scripts/workflow-summary.py"
      - ".github/workflows/local-workflow-summary-ci.yml"
      - ".github/workflows/reusable-workflow-summary.yml"

  # Allow maintainers to run validation manually.
  workflow_dispatch:

# Minimum permissions required by the reusable workflows.
permissions:
  actions: read
  contents: read

jobs:
  # Run the reusable Python CI workflow against the target script.
  python-ci:
    name: 🧪 Python CI
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      paths: ".github/scripts/workflow-summary.py"

  # Generate a Markdown workflow summary even if Python CI fails.
  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - python-ci
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml
    with:
      artifact_retention_days: 90

  # Notify Slack only for failure/timed_out results.
  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
