name: Reusable Link Checker

on:
  workflow_call:
    inputs:
      flags:
        description: "Command-line flags to pass to Awesomebot"
        required: false
        type: string
        default: "default"

      whitelist:
        description: "Comma-separated list of files or regex patterns to whitelist"
        required: false
        type: string

      include_files:
        description: "Comma-separated list of files or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of files or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Generate a report but do not fail the build"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed errors"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped files"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable coloured output"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  link-checker:
    name: Link Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set Up Ruby 3.4
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1.316.0
        with:
          ruby-version: "3.4"

      - name: Run Link Checker (awesome_bot)
        env:
          FLAGS: ${{ inputs.flags }}
          WHITELIST: ${{ inputs.whitelist }}
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: |
          bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/awesomebot/master/pipeline.sh)
