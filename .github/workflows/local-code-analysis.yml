name: Local Code Analysis

on:
  push:
    branches-ignore:
      - "dependabot/"
    paths-ignore:
      - "**/*.md"

  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"

  schedule:
    - cron: "4 3 * * 1"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  code-analysis:
    name: Code Analysis
    uses: ./.github/workflows/reusable-code-analysis.yml
    with:
      languages: "python"

  generate-workflow-summary:
    name: Generate Workflow Summary
    needs:
      - code-analysis
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  send-slack-notification:
    name: Send Slack Notification
    needs:
      - generate-workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-notifier.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
