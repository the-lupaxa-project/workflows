# 📚 Reusable Validate Citations File
#
# Purpose:
#   Validates one or more CITATION.cff files using the shared citation validation
#   pipeline.
#
# Features:
#   - Validates CITATION.cff syntax and structure.
#   - Supports include and exclude filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#   - Uses the shared CICDToolbox citation validation pipeline.
#
# Intended Usage:
#
#   jobs:
#     validate-citations-file:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-validate-citations-file.yml@master

name: 📚 Reusable Validate Citations File

on:
  workflow_call:
    inputs:
      include_files:
        description: "Comma-separated list of files or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of files or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Generate a report but do not fail the build"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed errors"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped files"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable coloured output"
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Runs CITATION.cff validation.
  validate-citations-file:
    name: 📚 Validate Citations File
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents that will be scanned.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Run the shared citation validation pipeline.
      - name: 📚 Validate Citations File
        env:
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/validate-citations-file/master/pipeline.sh)
