# 🧹 Reusable Purge Deprecated Workflow Runs
#
# Purpose:
#   Removes obsolete GitHub Actions workflow runs using the
#   purge-deprecated-workflow-runs action.
#
# Features:
#   - Removes obsolete workflow runs.
#   - Optionally removes cancelled, failed and skipped runs.
#   - Supports age-based cleanup rules.
#   - Can use a custom GitHub token or github.token.
#
# Intended Usage:
#
#   jobs:
#     purge-deprecated-workflow-runs:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-purge-deprecated-workflow-runs.yml@master

name: 🧹 Reusable Purge Deprecated Workflow Runs

on:
  workflow_call:
    inputs:
      token:
        description: >
          Optional GitHub token to use for the purge.
          Defaults to github.token if not provided.
        required: false
        type: string

      remove_obsolete:
        description: "Remove obsolete workflow runs"
        required: false
        type: boolean
        default: true

      remove_cancelled:
        description: "Remove cancelled workflow runs"
        required: false
        type: boolean
        default: true

      remove_failed:
        description: "Remove failed workflow runs"
        required: false
        type: boolean
        default: false

      remove_skipped:
        description: "Remove skipped workflow runs"
        required: false
        type: boolean
        default: true

      remove_older_than:
        description: >
          Optional multi-line string passed to 'remove-older-than'.
          Example:
            30d *
            7d Some Workflow Name
        required: false
        type: string
        default: ""

# Permissions required by this reusable workflow.
#
# actions: write
#   Required to delete workflow runs.
#
# contents: read
#   Allows GitHub Actions to access repository metadata.
permissions:
  actions: write
  contents: read

jobs:
  # Removes deprecated GitHub Actions workflow runs.
  purge-deprecated-workflow-runs:
    name: 🧹 Purge Deprecated Workflow Runs
    runs-on: ubuntu-latest

    steps:
      # Execute the workflow run cleanup action.
      - name: 🧹 Purge Deprecated Workflow Runs
        uses: otto-de/purge-deprecated-workflow-runs@ad569cd76e698bfe428cecc611bf23c477b9f8dd  # v4.0.12
        with:
          token: ${{ inputs.token || github.token }}
          remove-obsolete: ${{ inputs.remove_obsolete }}
          remove-cancelled: ${{ inputs.remove_cancelled }}
          remove-failed: ${{ inputs.remove_failed }}
          remove-skipped: ${{ inputs.remove_skipped }}
          remove-older-than: ${{ inputs.remove_older_than }}
