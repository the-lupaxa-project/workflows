name: Reusable GitHub Actions Security

on:
  workflow_call:
    inputs:
      allow_list:
        description: >
          Optional newline-separated list of owner[/repo] patterns that are
          allowed to use non-SHA refs (e.g. "the-lupaxa-project/.github").
          Each line should be either "owner/" or "owner/repo".
        required: false
        type: string

      dry_run:
        description: >
          If true, only report unpinned actions but do not fail the job.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  reusable-github-actions-security:
    name: Reusable GitHub Actions Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify SHA-Pinned GitHub Actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9  # v5.0.5
        with:
          allowlist: |
            the-lupaxa-project/workflows
            ${{ inputs.allow_list }}
          dry_run: ${{ inputs.dry_run }}
