name: Local Send to Slack CI - send-to-slack.py

on:
  push:
    paths:
      - ".github/scripts/send-to-slack.py"
      - ".github/workflows/local-send-to-slack-ci.yml"

  pull_request:
    paths:
      - ".github/scripts/send-to-slack.py"
      - ".github/workflows/local-send-to-slack-ci.yml"

  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  python-ci:
    name: Python CI
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      paths: ".github/scripts/send-to-slack.py"

  generate-workflow-summary:
    name: Generate Workflow Summary
    needs:
      - python-ci
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  send-slack-notification:
    name: Send Slack Notification
    needs:
      - generate-workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-notifier.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
