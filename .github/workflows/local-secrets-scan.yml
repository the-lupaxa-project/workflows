name: 🔒 Local Secrets Scan

on:
  push:
    branches:
      - "**"

  pull_request:

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    name: 🔒 Secrets Scan
    uses: ./.github/workflows/reusable-secrets-scan.yml
    secrets: inherit

  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - trufflehog
    if: always()
    uses: ./.github/workflows/reusable-check-jobs-status.yml
    with:
      ignore_jobs: "💬 Slack Notification"

  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
      ignore_jobs: "📊 Workflow Summary,💬 Slack Notification"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
