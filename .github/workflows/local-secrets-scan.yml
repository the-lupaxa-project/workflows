# 🔒 Local Secrets Scan
#
# Purpose:
#   Scans the repository for hard-coded secrets, credentials, API keys and other
#   sensitive information before changes are merged or deployed.
#
# Scope:
#   This is a local workflow for the workflows repository. It delegates the
#   scanning to the reusable TruffleHog workflow.
#
# Triggers:
#   - Pushes to any branch.
#   - Pull requests.
#   - Manual execution via workflow_dispatch.
#
# Notes:
#   - Scanning both push and pull request events helps detect secrets before
#     they become part of the repository history.
#   - secrets: inherit allows the reusable workflow access to repository secrets
#     if required.
#   - pull-requests: read permission allows TruffleHog to compare pull request
#     changes when appropriate.
#   - The workflow summary and Slack notification always run, ensuring failures
#     are still reported even if the secrets scan fails.

name: 🔒 Local Secrets Scan

on:
  # Scan every push.
  push:
    branches:
      - "**"

  # Scan all pull requests.
  pull_request:

  # Allow maintainers to trigger a scan manually.
  workflow_dispatch:

# Prevent overlapping scans for the same workflow/ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions required by the reusable workflow.
permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  # Scan the repository for secrets.
  trufflehog:
    name: 🔒 Secrets Scan
    uses: ./.github/workflows/reusable-secrets-scan.yml
    secrets: inherit

  # Generate a Markdown workflow summary even if the scan fails.
  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - trufflehog
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  # Notify Slack only for failure/timed_out results.
  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
