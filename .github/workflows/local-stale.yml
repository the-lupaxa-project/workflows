# 🧹 Local Stale Issue & PR Handler
#
# Purpose:
#   Automatically manages stale issues and pull requests by applying stale
#   labels, posting reminder comments and eventually closing inactive items
#   according to the repository policy.
#
# Scope:
#   This is a local workflow for the workflows repository. It delegates all
#   stale issue and pull request management to the reusable Stale workflow.
#
# Triggers:
#   - Daily scheduled execution at 05:35 UTC.
#   - Manual execution via workflow_dispatch.
#
# Notes:
#   - issues: write and pull-requests: write permissions are required because
#     the workflow may add/remove labels, post comments and close issues or
#     pull requests.
#   - Running daily ensures stale items are handled promptly while keeping
#     repository maintenance fully automated.
#   - The workflow summary and Slack notification always run, ensuring failures
#     are still reported even if the stale management job fails.

name: 🧹 Local Stale Issue & PR Handler

on:
  # Run once per day to process stale issues and pull requests.
  schedule:
    - cron: "35 5 * * *"

  # Allow maintainers to run stale processing manually.
  workflow_dispatch:

# Prevent overlapping runs for the same workflow/ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions required by the reusable workflow.
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Process stale issues and pull requests.
  stale:
    name: 🧹 Stale Issue & PR Handler
    uses: ./.github/workflows/reusable-stale.yml

  # Generate a Markdown workflow summary even if stale processing fails.
  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - stale
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  # Notify Slack only for failure/timed_out results.
  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
