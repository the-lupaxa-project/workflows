# 📄 Reusable YAML Lint
#
# Purpose:
#   Validates YAML files for syntax, formatting and common style issues using
#   the shared YAML lint pipeline.
#
# Features:
#   - Detects YAML syntax errors.
#   - Checks formatting and style.
#   - Supports include and exclude filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#   - Uses the shared CICDToolbox YAML lint pipeline.
#
# Intended Usage:
#
#   jobs:
#     yaml-lint:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-yaml-lint.yml@master

name: 📄 Reusable YAML Lint

on:
  workflow_call:
    inputs:
      include_files:
        description: "Comma-separated list of files or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of files or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Do not fail the build even if errors occur"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed error output"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped or ignored files in the output"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable ANSI colours"
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Runs YAML validation and style checks.
  yaml-lint:
    name: 📄 YAML Lint
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository contents that will be scanned.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Install Python for the shared YAML lint pipeline.
      - name: 🐍 Set Up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.x"

      # Run the shared YAML lint pipeline.
      - name: 📄 Run YAML Lint
        env:
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: |
          bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/yaml-lint/master/pipeline.sh)
