name: Reusable MkDocs Publish

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        default: "3.13"
        type: string
      use-dev-extras:
        description: 'Try to install ".[dev]" from pyproject.toml'
        required: false
        default: true
        type: boolean
      cleanup:
        description: "Clean up existing deployments in the github-pages environment before deploying"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip

          if [ "${{ inputs.use-dev-extras }}" = "true" ]; then
            echo "Attempting to install dev extras from pyproject.toml..."
            if python -m pip install ".[dev]" 2>/dev/null; then
              echo "Installed dev extras from pyproject.toml"
            else
              echo "Dev extras failed; falling back to mkdocs + theme only."
              python -m pip install mkdocs mkdocs-material
            fi
          else
            echo "Using bare mkdocs + theme (no dev extras)."
            python -m pip install mkdocs mkdocs-material
          fi

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Clean up old GitHub Pages deployments
        if: ${{ inputs.cleanup }}
        uses: strumwolf/delete-deployment-environment@035f6d27c8b8951729f4d71b2d3d6a7975139476  # v4.0.0
        with:
          token: ${{ github.token }}
          environment: github-pages
          onlyRemoveDeployments: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
