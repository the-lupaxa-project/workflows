name: 🔒 Local CodeQL Analysis

on:
  push:
    branches-ignore:
      - "dependabot/"
    paths-ignore:
      - "**/*.md"

  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"

  schedule:
    - cron: "4 3 * * 1"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: 🔒 CodeQL Analysis
    uses: ./.github/workflows/reusable-codeql.yml
    with:
      languages: "python"

  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - codeql
    if: always()
    uses: ./.github/workflows/reusable-check-jobs-status.yml
    with:
      ignore_jobs: "💬 Slack Notification"

  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
      ignore_jobs: "📊 Workflow Summary,💬 Slack Notification"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
