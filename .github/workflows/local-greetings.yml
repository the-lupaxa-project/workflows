# 👋 Local Greetings
#
# Purpose:
#   Welcomes first-time contributors by automatically posting friendly messages
#   on their first issue or pull request.
#
# Scope:
#   This is a local workflow for the workflows repository. It delegates the
#   greeting logic to the reusable Greetings workflow.
#
# Triggers:
#   - New issues.
#   - New pull requests.
#   - Manual execution via workflow_dispatch.
#
# Notes:
#   - The reusable workflow determines whether the author is a first-time
#     contributor before posting a greeting.
#   - The built-in GITHUB_TOKEN is supplied as the repository token used to
#     create comments.
#   - issues: write and pull-requests: write permissions are required because
#     the workflow posts comments.
#   - The workflow summary and Slack notification always run, ensuring failures
#     are still reported even if the greeting job fails.

name: 👋 Local Greetings

on:
  # Welcome new pull request contributors.
  pull_request:

  # Welcome new issue reporters.
  issues:

  # Allow maintainers to trigger the workflow manually.
  workflow_dispatch:

# Prevent overlapping runs for the same workflow/ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions required by the reusable workflow.
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Welcome first-time contributors.
  greetings:
    name: 👋 Greetings
    uses: ./.github/workflows/reusable-greetings.yml
    secrets:
      repo-token: ${{ secrets.GITHUB_TOKEN }}

  # Generate a Markdown workflow summary even if the greetings job fails.
  workflow-summary:
    name: 📊 Workflow Summary
    needs:
      - greetings
    if: always()
    uses: ./.github/workflows/reusable-workflow-summary.yml

  # Notify Slack only for failure/timed_out results.
  slack-notification:
    name: 💬 Slack Notification
    needs:
      - workflow-summary
    if: always()
    uses: ./.github/workflows/reusable-slack-workflow-status.yml
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
