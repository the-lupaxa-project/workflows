# 🔗 Reusable Link & Anchor Validation
#
# Purpose:
#   Validates Markdown links and anchors using the shared Awesomebot pipeline.
#
# Features:
#   - Detects broken HTTP/HTTPS links.
#   - Validates local Markdown links and anchors.
#   - Supports include, exclude and whitelist filters.
#   - Can run in report-only mode.
#   - Can show detailed errors and skipped files.
#
# Intended Usage:
#
#   jobs:
#     link-anchor-validation:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-awesomebot.yml@master

name: 🔗 Reusable Link & Anchor Validation

on:
  workflow_call:
    inputs:
      flags:
        description: "Command-line flags to pass to Awesomebot"
        required: false
        type: string
        default: "default"

      whitelist:
        description: "Comma-separated list of files or regex patterns to whitelist"
        required: false
        type: string

      include_files:
        description: "Comma-separated list of files or regex patterns to include"
        required: false
        type: string

      exclude_files:
        description: "Comma-separated list of files or regex patterns to exclude"
        required: false
        type: string

      report_only:
        description: "Generate a report but do not fail the build"
        required: false
        type: boolean
        default: false

      show_errors:
        description: "Show detailed errors"
        required: false
        type: boolean
        default: true

      show_skipped:
        description: "Show skipped files"
        required: false
        type: boolean
        default: false

      no_color:
        description: "Disable coloured output"
        required: false
        type: boolean
        default: false

# Permissions required by this reusable workflow.
#
# contents: read
#   Allows checkout and inspection of repository files.
permissions:
  contents: read

jobs:
  # Validate Markdown links and anchors using the shared Awesomebot pipeline.
  link-anchor-validation:
    name: 🔗 Link & Anchor Validation
    runs-on: ubuntu-latest

    steps:
      # Checkout repository contents for validation.
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Install Ruby because Awesomebot requires a Ruby runtime.
      - name: 💎 Set Up Ruby 3.4
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: "3.4"

      # Run the shared Awesomebot pipeline.
      - name: 🔗 Run Link & Anchor Validation
        env:
          FLAGS: ${{ inputs.flags }}
          WHITELIST: ${{ inputs.whitelist }}
          INCLUDE_FILES: ${{ inputs.include_files }}
          EXCLUDE_FILES: ${{ inputs.exclude_files }}
          REPORT_ONLY: ${{ inputs.report_only }}
          SHOW_ERRORS: ${{ inputs.show_errors }}
          SHOW_SKIPPED: ${{ inputs.show_skipped }}
          NO_COLOR: ${{ inputs.no_color }}
        run: |
          bash <(curl -s https://raw.githubusercontent.com/CICDToolbox/awesomebot/master/pipeline.sh)
