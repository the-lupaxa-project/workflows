# 💬 Reusable Slack Notification
#
# Purpose:
#   Sends a Slack notification summarising the outcome of a GitHub Actions
#   workflow using the shared notification script.
#
# Features:
#   - Sends notifications for selected workflow results.
#   - Optionally includes individual job results.
#   - Optionally includes the commit message.
#   - Allows selected jobs to be excluded from the notification.
#   - Automatically ignores the workflow summary and Slack notification jobs.
#   - Skips notifications for Dependabot pull requests and forks.
#
# Intended Usage:
#
#   jobs:
#     slack-notification:
#       uses: the-lupaxa-project/workflows/.github/workflows/reusable-slack-workflow-status.yml@master
#       with:
#         notify_on_results: "failure,timed_out"
#       secrets:
#         slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

name: 💬 Reusable Slack Notification

on:
  workflow_call:
    inputs:
      include_jobs:
        description: >
          "true" includes all jobs, "false" excludes jobs, and "on-failure"
          includes jobs only when the workflow did not succeed.
        required: false
        type: string
        default: "true"

      include_commit_message:
        description: "Include the commit message in the notification."
        required: false
        type: boolean
        default: true

      notify_on_results:
        description: >
          Comma-separated list of results to notify on, for example
          "failure,cancelled,timed_out". Use "all" to notify on every result.
        required: false
        type: string
        default: "all"

      ignore_jobs:
        description: >
          Comma-separated list of job names to exclude from the per-job Slack fields.
          Names are normalised and matched case-insensitively.
        required: false
        type: string
        default: ""

    secrets:
      slack_webhook_url:
        required: true

# Permissions required by this reusable workflow.
#
# actions: read
#   Allows workflow and job status information to be read.
#
# contents: read
#   Allows repository metadata to be read.
permissions:
  actions: read
  contents: read

jobs:
  # Sends a Slack notification for the completed workflow.
  slack-notification:
    name: 💬 Slack Notification
    runs-on: ubuntu-latest

    # Always evaluate the notification, but skip Dependabot pull requests and
    # pull requests originating from forks.
    if: >
      always() &&
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )

    steps:
      # Checkout the shared workflows repository containing the notification script.
      - name: 📥 Checkout Workflows Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: the-lupaxa-project/workflows
          path: lupaxa-dotgithub

      # Execute the shared Slack notification script.
      - name: 💬 Send Slack Notification
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          SEND_TO_SLACK_RESULTS: ${{ inputs.notify_on_results }}
          SEND_TO_SLACK_INCLUDE_JOBS: ${{ inputs.include_jobs }}
          SEND_TO_SLACK_INCLUDE_COMMIT_MESSAGE: ${{ inputs.include_commit_message }}
          SEND_TO_SLACK_IGNORE_JOBS: "📊 Workflow Summary,💬 Slack Notification,${{ inputs.ignore_jobs }}"
        run: |
          python lupaxa-dotgithub/.github/scripts/send-to-slack.py
